<!DOCTYPE html>
<html>
<head>
    <title>Shopping List Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg-dark: #0f0f0f;
            --bg-card: #1a1a1a;
            --bg-elevated: #242424;
            --accent: #a78bfa;
            --accent-glow: rgba(167, 139, 250, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --success: #34d399;
            --danger: #f87171;
            --border: rgba(255,255,255,0.08);
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            padding: 40px 20px;
            background-image: 
                radial-gradient(ellipse at 20% 20%, rgba(167, 139, 250, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
        }
        
        .container {
            max-width: 520px;
            margin: 0 auto;
            background: var(--bg-card);
            border-radius: 24px;
            box-shadow: 
                0 0 0 1px var(--border),
                0 25px 50px -12px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        
        .header { 
            padding: 35px 30px 25px;
            border-bottom: 1px solid var(--border);
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-content {
            flex: 1;
        }
        
        .back-btn {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 18px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        .back-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), #8b5cf6, #a78bfa);
        }
        
        .header h2 { 
            font-size: 26px; 
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }
        
        .header p { 
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 6px;
        }
        
        .input-group {
            padding: 25px;
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border);
        }
        
        .input-row {
            display: flex;
            gap: 12px;
            margin-bottom: 14px;
        }
        
        input {
            flex: 1;
            padding: 14px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        
        input::placeholder { 
            color: var(--text-muted); 
        }
        
        button.add-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        button.add-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        
        button.add-btn:hover::before {
            left: 100%;
        }
        
        button.add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
        }
        
        .list-container {
            padding: 20px;
            min-height: 250px;
            max-height: 450px;
            overflow-y: auto;
        }
        
        .list-container::-webkit-scrollbar {
            width: 6px;
        }
        
        .list-container::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .list-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        
        ul { list-style: none; }
        
        li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px;
            margin-bottom: 12px;
            background: var(--bg-elevated);
            border-radius: 16px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            animation: fadeSlideIn 0.4s ease forwards;
        }
        
        li.animate {
            opacity: 1;
        }
        
        @keyframes fadeSlideIn {
            from { 
                opacity: 0; 
                transform: translateY(10px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }
        
        li:hover {
            border-color: rgba(167, 139, 250, 0.3);
            transform: translateY(-2px);
        }
        
        .item-info {
            flex: 1;
            min-width: 0;
        }
        
        .item-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .item-details {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .item-details .category {
            background: rgba(167, 139, 250, 0.15);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .item-details .price {
            color: var(--text-muted);
        }
        
        .item-actions {
            display: flex;
            gap: 8px;
            margin-left: 12px;
        }
        
        .item-actions button {
            width: 38px;
            height: 38px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .check-btn {
            background: rgba(52, 211, 153, 0.15);
            color: var(--success);
        }
        
        .check-btn:hover { 
            background: var(--success);
            color: var(--bg-dark);
            transform: scale(1.1);
        }
        
        .delete-btn {
            background: rgba(248, 113, 113, 0.15);
            color: var(--danger);
        }
        
        .delete-btn:hover { 
            background: var(--danger);
            color: white;
            transform: scale(1.1);
        }
        
        li.bought {
            opacity: 0.4;
            background: rgba(30, 30, 30, 0.6) !important;
            border-color: rgba(255, 255, 255, 0.05) !important;
        }
        
        li.bought .item-name {
            text-decoration: line-through !important;
            text-decoration-color: #f87171 !important;
            text-decoration-thickness: 2px;
            color: var(--text-muted) !important;
        }
        
        .footer {
            padding: 22px 25px;
            background: var(--bg-elevated);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .total-label {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .total {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .warning {
            color: var(--danger);
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        
        .empty-state span {
            font-size: 48px;
            display: block;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .empty-state p {
            font-size: 15px;
            color: var(--text-secondary);
        }

        .list-manager {
            padding: 15px 25px;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .list-manager select {
            flex: 1;
            min-width: 150px;
            padding: 10px 12px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
        }

        .list-manager button {
            padding: 10px 14px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .list-manager button:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .list-manager .delete-list-btn:hover {
            background: var(--danger);
            border-color: var(--danger);
        }

        .category-breakdown {
            padding: 20px 25px;
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border);
            display: none;
        }

        .category-breakdown.show {
            display: block;
        }

        .breakdown-title {
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .breakdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .breakdown-label {
            min-width: 100px;
            font-size: 13px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .breakdown-bar {
            flex: 1;
            height: 6px;
            background: var(--bg-card);
            border-radius: 3px;
            overflow: hidden;
            min-width: 100px;
        }

        .breakdown-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #a78bfa);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .breakdown-amount {
            min-width: 50px;
            text-align: right;
            font-size: 13px;
            color: var(--accent);
            font-weight: 600;
        }

        .sort-btn {
            padding: 10px 14px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .sort-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .sort-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="index.html" class="back-btn" title="Back to Dashboard">←</a>
        <div class="header-content">
            <h2>🛒 Shopping List</h2>
            <p>Manage your items with style</p>
        </div>
    </div>
    
    <div class="input-group">
        <div class="input-row">
            <input id="name" placeholder="Item name">
            <input id="category" placeholder="Category">
        </div>
        <div class="input-row">
            <input id="price" type="number" placeholder="Price (₹)">
            <button class="add-btn" onclick="addItem()">Add Item</button>
        </div>
    </div>

    <div class="list-manager">
        <select id="listSelect" onchange="switchList()">
            <option value="">Select a list...</option>
        </select>
        <button onclick="createNewList()">+ New List</button>
        <button class="delete-list-btn" onclick="deleteCurrentList()" id="deleteListBtn" style="display:none;">Delete</button>
        <button class="sort-btn" id="sortBtn" onclick="toggleSort()">Sort by Category</button>
    </div>

    <div class="category-breakdown" id="categoryBreakdown"></div>

    <div class="list-container">
        <ul id="list"></ul>
    </div>

    <div class="footer">
        <div>
            <div class="total-label">Total</div>
            <div class="total" id="total">₹0</div>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <input type="number" id="budgetInput" value="2000" placeholder="Budget" style="width: 80px; padding: 8px 10px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 13px;" onchange="updateBudget()">
            <div id="warning"></div>
        </div>
    </div>
</div>

<script>
let items = [];
let budget = 2000;
let currentListName = "";
let sortByCategory = false;
let allLists = {}; // Store all lists

// Initialize on page load
window.addEventListener('load', () => {
    loadAllLists();
    updateListSelect();
});

// Load all lists from localStorage
function loadAllLists() {
    const saved = localStorage.getItem('shoppingLists');
    if (saved) {
        allLists = JSON.parse(saved);
    }
}

// Save all lists to localStorage
function saveAllLists() {
    localStorage.setItem('shoppingLists', JSON.stringify(allLists));
}

// Update the list selector dropdown
function updateListSelect() {
    const select = document.getElementById('listSelect');
    select.innerHTML = '<option value="">Select a list...</option>';
    for (let listName in allLists) {
        const option = document.createElement('option');
        option.value = listName;
        option.textContent = listName + ` (${allLists[listName].items.length})`;
        select.appendChild(option);
    }
    
    if (currentListName && allLists[currentListName]) {
        select.value = currentListName;
        document.getElementById('deleteListBtn').style.display = 'inline-block';
    } else {
        document.getElementById('deleteListBtn').style.display = 'none';
    }
}

// Create a new list
function createNewList() {
    const name = prompt("Enter new list name:");
    if (!name || name.trim() === "") return;
    
    const listName = name.trim();
    if (allLists[listName]) {
        alert("List '" + listName + "' already exists!");
        return;
    }
    
    allLists[listName] = { items: [], budget: 2000 };
    saveAllLists();
    switchList(listName);
    updateListSelect();
}

// Switch to a different list
function switchList(listName = null) {
    if (!listName) {
        listName = document.getElementById('listSelect').value;
    }
    
    if (!listName || !allLists[listName]) {
        currentListName = "";
        items = [];
        budget = 2000;
        display();
        return;
    }
    
    currentListName = listName;
    items = allLists[listName].items;
    budget = allLists[listName].budget;
    sortByCategory = false;
    document.getElementById('sortBtn').classList.remove('active');
    document.getElementById('listSelect').value = listName;
    document.getElementById('deleteListBtn').style.display = 'inline-block';
    display();
}

// Delete current list
function deleteCurrentList() {
    if (!currentListName) return;
    if (!confirm("Delete list '" + currentListName + "'?")) return;
    
    delete allLists[currentListName];
    saveAllLists();
    currentListName = "";
    items = [];
    budget = 2000;
    sortByCategory = false;
    document.getElementById('sortBtn').classList.remove('active');
    updateListSelect();
    display();
}

// Toggle sort by category
function toggleSort() {
    sortByCategory = !sortByCategory;
    document.getElementById('sortBtn').classList.toggle('active');
    display();
}

function updateBudget() {
    budget = parseFloat(document.getElementById("budgetInput").value) || 2000;
    if (currentListName && allLists[currentListName]) {
        allLists[currentListName].budget = budget;
        saveAllLists();
    }
    display();
}

function addItem() {
    if (!currentListName) {
        alert("Please create or select a list first!");
        return;
    }

    let name = document.getElementById("name").value;
    let category = document.getElementById("category").value;
    let price = parseFloat(document.getElementById("price").value);
    
    if (!name || !price) {
        alert("Please enter item name and price!");
        return;
    }

    items.push({ name, category, price, bought: false });
    saveListData();
    display();
    
    document.getElementById("name").value = "";
    document.getElementById("category").value = "";
    document.getElementById("price").value = "";
    document.getElementById("name").focus();
}

function saveListData() {
    if (currentListName && allLists[currentListName]) {
        allLists[currentListName].items = items;
        saveAllLists();
    }
}

function display() {
    let list = document.getElementById("list");
    list.innerHTML = "";
    let total = 0;

    if (items.length === 0) {
        list.innerHTML = `<div class="empty-state">
            <span>✨</span>
            <p>${currentListName ? "Add your first item!" : "Create or select a list to get started!"}</p>
        </div>`;
        document.getElementById("total").innerText = "₹0";
        document.getElementById("warning").innerText = "";
        document.getElementById("categoryBreakdown").classList.remove('show');
        return;
    }

    // Sort items if needed
    let displayItems = [...items];
    if (sortByCategory) {
        displayItems.sort((a, b) => {
            const catA = (a.category || 'General').toLowerCase();
            const catB = (b.category || 'General').toLowerCase();
            return catA.localeCompare(catB);
        });
    }

    displayItems.forEach((item, index) => {
        total += item.price;

        let li = document.createElement("li");
        li.style.animationDelay = `${index * 0.05}s`;
        li.classList.add("animate");
        
        const originalIndex = items.indexOf(item);
        li.innerHTML = `
            <div class="item-info">
                <div class="item-name">${item.name}</div>
                <div class="item-details">
                    <span class="category">${item.category || 'General'}</span>
                    <span class="price">₹${item.price}</span>
                </div>
            </div>
            <div class="item-actions">
                <button class="check-btn" onclick="toggle(${originalIndex})" title="Mark as bought">✓</button>
                <button class="delete-btn" onclick="removeItem(${originalIndex})" title="Remove item">✕</button>
            </div>`;

        if (item.bought) li.classList.add("bought");

        list.appendChild(li);
    });

    document.getElementById("total").innerText = "₹" + total.toLocaleString();

    let warning = document.getElementById("warning");
    if (total > budget) {
        warning.innerHTML = "<span>⚠</span> Budget exceeded";
    } else {
        warning.innerText = "";
    }

    // Display category breakdown
    displayCategoryBreakdown();
}

function displayCategoryBreakdown() {
    if (items.length === 0) {
        document.getElementById("categoryBreakdown").classList.remove('show');
        return;
    }

    const breakdown = {};
    let maxAmount = 0;

    items.forEach(item => {
        const cat = item.category || 'General';
        if (!breakdown[cat]) breakdown[cat] = 0;
        breakdown[cat] += item.price;
        maxAmount = Math.max(maxAmount, breakdown[cat]);
    });

    let html = '<div class="breakdown-title">Spending by Category</div>';
    
    Object.keys(breakdown).sort().forEach(cat => {
        const amount = breakdown[cat];
        const percentage = (amount / maxAmount) * 100;
        html += `
            <div class="breakdown-item">
                <div class="breakdown-label">${cat}</div>
                <div class="breakdown-bar">
                    <div class="breakdown-fill" style="width: ${percentage}%"></div>
                </div>
                <div class="breakdown-amount">₹${amount.toFixed(0)}</div>
            </div>`;
    });

    const breakdownDiv = document.getElementById("categoryBreakdown");
    breakdownDiv.innerHTML = html;
    breakdownDiv.classList.add('show');
}

function toggle(i) {
    items[i].bought = !items[i].bought;
    saveListData();
    display();
}

function removeItem(i) {
    if (confirm("Remove this item?")) {
        items.splice(i, 1);
        saveListData();
        display();
    }
}
</script>

</body>
</html>
