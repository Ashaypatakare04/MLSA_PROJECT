<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0f0f0f;
            --bg-card: #1a1a1a;
            --bg-elevated: #242424;
            --accent: #a78bfa;
            --accent-glow: rgba(167, 139, 250, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --success: #34d399;
            --danger: #f87171;
            --border: rgba(255,255,255,0.08);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: 
                radial-gradient(ellipse at 20% 20%, rgba(167, 139, 250, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
        }

        .container {
            background: var(--bg-card);
            border-radius: 24px;
            box-shadow: 
                0 0 0 1px var(--border),
                0 25px 50px -12px rgba(0,0,0,0.5);
            padding: 50px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), #8b5cf6, #a78bfa);
            border-radius: 24px 24px 0 0;
        }

        h1 {
            color: var(--text-primary);
            font-size: 2em;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1em;
            margin-bottom: 40px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px 20px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 15px 40px rgba(167, 139, 250, 0.2);
        }

        .card-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .card-title {
            color: var(--text-primary);
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card-desc {
            color: var(--text-muted);
            font-size: 0.9em;
        }

        .shopping-card:hover {
            border-color: var(--success);
            box-shadow: 0 15px 40px rgba(52, 211, 153, 0.2);
        }

        .bank-card:hover {
            border-color: var(--accent);
            box-shadow: 0 15px 40px rgba(167, 139, 250, 0.2);
        }

        @media (max-width: 500px) {
            .cards {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Dashboard</h1>
    <p class="subtitle">Select an app to get started</p>
    
    <div class="cards">
        <a href="Shopping_List.html" class="card shopping-card">
            <div class="card-icon">🛒</div>
            <div class="card-title">Shopping List</div>
            <div class="card-desc">Manage your shopping items</div>
        </a>
        
        <a href="Bank_Simulator.html" class="card bank-card">
            <div class="card-icon">💰</div>
            <div class="card-title">Bank Simulator</div>
            <div class="card-desc">Track your finances</div>
        </a>
    </div>
</div>

</body>
</html>
