<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Simulator</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
    --bg-dark:#0f0f0f;
    --bg-card:#1a1a1a;
    --bg-elevated:#242424;
    --accent:#a78bfa;
    --text-primary:#fff;
    --text-secondary:#a1a1aa;
    --success:#34d399;
    --danger:#f87171;
    --border:rgba(255,255,255,0.08);
}

body {
    font-family:'Outfit',sans-serif;
    background:var(--bg-dark);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container {
    background:var(--bg-card);
    padding:30px;
    border-radius:20px;
    width:100%;
    max-width:420px;
    box-shadow:0 0 0 1px var(--border), 0 20px 40px rgba(0,0,0,0.5);
}

h2 {
    text-align:center;
    color:var(--text-primary);
    margin-bottom:20px;
}

input {
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--bg-elevated);
    color:white;
    margin-bottom:15px;
}

.buttons {
    display:flex;
    gap:10px;
}

button {
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

#deposit { background:var(--success); color:white; }
#withdraw { background:var(--danger); color:white; }

#balance {
    text-align:center;
    margin:20px 0;
    font-size:1.8em;
    font-weight:bold;
    color:var(--accent);
}

#alert {
    text-align:center;
    color:var(--danger);
    margin-bottom:10px;
}

ul {
    list-style:none;
    background:var(--bg-elevated);
    padding:10px;
    border-radius:10px;
    max-height:200px;
    overflow-y:auto;
}

li {
    padding:8px;
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
}

.deposit { color:var(--success); }
.withdraw { color:var(--danger); }

.empty {
    text-align:center;
    color:var(--text-secondary);
}
</style>
</head>

<body>

<div class="container">
    <h2>💰 Bank Simulator</h2>

    <input id="amount" type="number" placeholder="Enter amount ₹">

    <div class="buttons">
        <button id="deposit">Deposit</button>
        <button id="withdraw">Withdraw</button>
    </div>

    <div id="balance">₹0</div>
    <div id="alert"></div>

    <ul id="history"></ul>
</div>

<script>
let balance = 0;
let history = [];

// Load saved data
const saved = JSON.parse(localStorage.getItem("bankData"));
if (saved) {
    balance = saved.balance;
    history = saved.history;
}

// Buttons
document.getElementById("deposit").addEventListener("click", deposit);
document.getElementById("withdraw").addEventListener("click", withdraw);

function deposit() {
    let amt = parseFloat(document.getElementById("amount").value);

    if (isNaN(amt) || amt <= 0) {
        alert("Enter valid amount");
        return;
    }

    amt = Math.round(amt);
    balance += amt;

    history.unshift({ type:"deposit", amount:amt });

    save();
    update();
}

function withdraw() {
    let amt = parseFloat(document.getElementById("amount").value);

    if (isNaN(amt) || amt <= 0) {
        alert("Enter valid amount");
        return;
    }

    amt = Math.round(amt);

    if (amt > balance) {
        alert("Insufficient balance");
        return;
    }

    balance -= amt;

    history.unshift({ type:"withdraw", amount:amt });

    save();
    update();
}

function update() {
    document.getElementById("balance").innerText = "₹" + balance.toLocaleString();

    let list = document.getElementById("history");

    if (history.length === 0) {
        list.innerHTML = '<li class="empty">No transactions</li>';
    } else {
        list.innerHTML = "";
        history.forEach(h => {
            let li = document.createElement("li");
            li.className = h.type;
            li.innerHTML = `<span>${h.type}</span><span>₹${h.amount}</span>`;
            list.appendChild(li);
        });
    }

    // Minimum balance alert
    let alertBox = document.getElementById("alert");
    alertBox.innerText = balance < 500 ? "⚠ Low Balance!" : "";

    document.getElementById("amount").value = "";
}

// Save data
function save() {
    localStorage.setItem("bankData", JSON.stringify({ balance, history }));
}

// Initial render
update();
</script>

</body>
</html>
